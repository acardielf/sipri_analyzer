; See https://docs.docker.com/desktop/networking/#i-want-to-connect-from-a-container-to-a-service-on-the-host
; See https://github.com/docker/for-linux/issues/264
; The `client_host` below may optionally be replaced with `discover_client_host=yes`
; Use trigger mode: debug only when XDEBUG_SESSION cookie/header is present.
; start_with_request=yes blocks FrankenPHP worker threads when no debugger is listening.
xdebug.start_with_request = trigger
xdebug.client_host = host.docker.internal
xdebug.connect_timeout_ms = 50

; Blackfire: vaciar el socket cuando no hay agente en ejecución (service blackfire comentado en compose.override.yaml).
; Sin esto, el worker FrankenPHP crashea (SIGSEGV) al intentar conectar a tcp://blackfire:8307.
blackfire.agent_socket =

memory_limit = 512M
